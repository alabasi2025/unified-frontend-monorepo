<div class="notebooks-container">
  <!-- Header -->
  <div class="notebooks-header">
    <div class="header-title">
      <h1>📚 دفاتر الملاحظات</h1>
      <p>إدارة دفاتر الملاحظات الخاصة بك</p>
    </div>
    <button class="btn-primary" (click)="createNotebook()">
      ➕ إنشاء دفتر جديد
    </button>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="🔍 ابحث في الدفاتر..."
      class="search-input"
    />
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>جاري التحميل...</p>
  </div>

  <!-- Notebooks Grid -->
  <div *ngIf="!loading" class="notebooks-grid">
    <div
      *ngFor="let notebook of filteredNotebooks"
      class="notebook-card"
      (click)="openNotebook(notebook.id)"
    >
      <div class="notebook-icon">📖</div>
      <div class="notebook-info">
        <h3>{{ notebook.title }}</h3>
        <p *ngIf="notebook.description">{{ notebook.description }}</p>
        <div class="notebook-meta">
          <span>📑 {{ notebook.sectionsCount || 0 }} أقسام</span>
          <span>📄 {{ notebook.pagesCount || 0 }} صفحات</span>
        </div>
        <div class="notebook-date">
          آخر تحديث: {{ notebook.updatedAt | date:'short' }}
        </div>
      </div>
      <button
        class="btn-delete"
        (click)="deleteNotebook(notebook.id, $event)"
        title="حذف الدفتر"
      >
        🗑️
      </button>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredNotebooks.length === 0" class="empty-state">
      <div class="empty-icon">📚</div>
      <h3>لا توجد دفاتر</h3>
      <p>ابدأ بإنشاء دفتر جديد</p>
      <button class="btn-primary" (click)="createNotebook()">
        ➕ إنشاء دفتر جديد
      </button>
    </div>
  </div>
</div>
